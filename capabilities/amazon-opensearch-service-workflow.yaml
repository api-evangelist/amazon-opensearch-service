naftiko: 1.0.0-alpha2
info:
  label: Amazon OpenSearch Service API Workflow
  description: Workflow capability composing Amazon OpenSearch Service APIs for developers and operators.
  tags:
  - Amazon OpenSearch Service
  - AWS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: openapi.yml
    baseUri: https://es.{region}.amazonaws.com
    description: The Amazon OpenSearch Service API enables programmatic management of OpenSearch domains. You can cre
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: domains
      path: /domains
      description: Domains operations for Amazon OpenSearch Service API
      operations:
      - name: CreateDomain
        method: POST
        description: Amazon OpenSearch Service Create an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: DescribeDomain
        method: GET
        description: Amazon OpenSearch Service Describe an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainName
          in: path
          type: string
          required: true
          description: domainName
      - name: DeleteDomain
        method: DELETE
        description: Amazon OpenSearch Service Delete an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainName
          in: path
          type: string
          required: true
          description: domainName
      - name: DescribeDomains
        method: POST
        description: Amazon OpenSearch Service Describe Multiple OpenSearch Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: ListDomainNames
        method: GET
        description: Amazon OpenSearch Service List All OpenSearch Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-opensearch-service-api
    description: Unified REST API for Amazon OpenSearch Service.
    resources:
    - path: /v1/resources
      name: resources
      description: Primary Amazon OpenSearch Service resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon OpenSearch Service resources
        call: openapi.yml.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-opensearch-service-mcp
    transport: http
    description: MCP server for AI-assisted Amazon OpenSearch Service operations.
    tools:
    - name: list-openapi.yml
      description: List and manage openapi.yml resources
      hints:
        readOnly: true
        openWorld: true
      call: openapi.yml.list
      outputParameters:
      - type: object
        mapping: $.
