naftiko: 1.0.0-alpha1
info:
  label: Amazon OpenSearch Service API
  description: The Amazon OpenSearch Service API enables programmatic management of OpenSearch domains. You can create, configure, update, and delete domains, manage access policies, configure VPC 
    endpoints, and mon
  tags:
  - Amazon OpenSearch Service
  - AWS
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - type: http
    namespace: openapi.yml
    baseUri: https://es.{region}.amazonaws.com
    description: The Amazon OpenSearch Service API enables programmatic management of OpenSearch domains. You can cre
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_AUTH}}'
      placement: header
    resources:
    - name: domains
      path: /domains
      description: Domains operations for Amazon OpenSearch Service API
      operations:
      - name: CreateDomain
        method: POST
        description: Amazon OpenSearch Service Create an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: DescribeDomain
        method: GET
        description: Amazon OpenSearch Service Describe an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainName
          in: path
          type: string
          required: true
          description: domainName
      - name: DeleteDomain
        method: DELETE
        description: Amazon OpenSearch Service Delete an OpenSearch Domain
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domainName
          in: path
          type: string
          required: true
          description: domainName
      - name: DescribeDomains
        method: POST
        description: Amazon OpenSearch Service Describe Multiple OpenSearch Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: ListDomainNames
        method: GET
        description: Amazon OpenSearch Service List All OpenSearch Domains
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
